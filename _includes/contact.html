<section id="contact">
    <div class="container">
        <div class="row">
            <div class="col-lg-8 offset-lg-2 text-center">
                <h2 class="section-heading">Fale connosco!</h2>
                <hr class="primary">
                <p>Pronto para iniciar seu próximo projecto connosco? Excelente! Entre em contato por telefone ou
                    envie-nos um e-mail, e retornaremos o mais breve possível.</p>
            </div>
        </div>
        <div class="row">
            <div class="col-lg-3 text-center">
                <a href="mailto:{{ site.social.email }}">
                    <i class="fa fa-envelope fa-3x wow bounceIn" data-wow-delay=".1s"></i>
                    <p>Email</p>
                </a>
            </div>
            <div class="col-lg-3 text-center">
                <a href="https://twitter.com/{{ site.social.twitter | remove: '@' }}">
                    <i class="fa fa-twitter fa-3x wow bounceIn" data-wow-delay=".1s"></i>
                    <p>{{ site.social.twitter }}</p>
                </a>
            </div>
            <div class="col-lg-3 text-center">
                <a href="https://instagram.com/{{ site.social.instagram | remove: '@' }}">
                    <i class="fa fa-instagram fa-3x wow bounceIn" data-wow-delay=".1s"></i>
                    <p>{{ site.social.instagram }}</p>
                </a>
            </div>
            <div class="col-lg-3 text-center">
                <a href="https://linkedin.com/{{ site.social.linkedin }}">
                    <i class="fa fa-linkedin fa-3x wow bounceIn" data-wow-delay=".1s"></i>
                    <p>LinkedIn</p>
                </a>
            </div>
        </div>
    </div>
</section>
